<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winter Conditions Check</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="/favicon.png" type="image/png">
</head>

<body>

    <h1>Winter Conditions Check</h1>

    <div class="useful-links">
        <a href="https://www.skitourenguru.com/" target="_blank" class="nav-link">
            <img src="https://www.google.com/s2/favicons?domain=skitourenguru.ch&sz=128" alt="Skitourenguru Logo"
                class="link-logo">
            Skitourenguru
        </a>
        <a href="https://www.sac-cas.ch/en/huts-and-tours/sac-route-portal/" target="_blank" class="nav-link">
            <img src="https://www.google.com/s2/favicons?domain=sac-cas.ch&sz=128" alt="SAC Route Portal Logo"
                class="link-logo">
            SAC Route Portal
        </a>
        <a href="https://www.meteoswiss.admin.ch/#tab=forecast-map" target="_blank" class="nav-link">
            <img src="https://www.google.com/s2/favicons?domain=meteoswiss.admin.ch&sz=128" alt="MeteoSwiss Logo"
                class="link-logo">
            MeteoSwiss
        </a>
        <a href="https://whiterisk.ch/en/conditions" target="_blank" class="nav-link">
            <img src="https://www.google.com/s2/favicons?domain=whiterisk.ch&sz=128" alt="White Risk Logo"
                class="link-logo">
            White Risk
        </a>
        <a href="https://www.strava.com/maps/create" target="_blank" class="nav-link">
            <img src="https://www.google.com/s2/favicons?domain=strava.com&sz=128" alt="Strava Logo" class="link-logo">
            Strava Map
        </a>
    </div>

    <div class="gpx-plotter">
        <h2>Skitourenguru GPX Profiler</h2>
        <div class="plotter-controls">
            <input type="url" id="sg-url" placeholder="https://www.skitourenguru.com/?id=..." autocomplete="off">
            <button id="plot-btn">Plot Route</button>
        </div>

        <h3 id="route-title" class="route-title hidden"></h3>
        <div id="route-stats" class="route-stats hidden">
            <span id="stat-gain">Gain: -- m</span>
            <span id="stat-loss">Loss: -- m</span>
        </div>

        <div id="chart-wrapper" class="plot-container hidden">
            <canvas id="elevation-chart"></canvas>
        </div>

        <div id="alpinemeteo-wrapper" class="alpinemeteo-container hidden">
            <iframe id="alpinemeteo-frame" src="" title="AlpineMeteo Snow Profile" allowfullscreen></iframe>
        </div>

        <div id="plot-error" class="error-msg"></div>
    </div>

    <div class="webcam-container">
        <div class="webcam-wrapper">
            <iframe src="https://uetliberg.roundshot.com/#/" allowfullscreen title="Uetliberg Webcam"></iframe>
            <div class="webcam-overlay" onclick="this.style.pointerEvents='none'"></div>
            <div class="webcam-annotation">Uetliberg: 870m</div>
        </div>
        <div class="webcam-wrapper">
            <iframe src="https://avisec.com/feed/rigi-rotstock" allowfullscreen title="Rigi Rotstock Webcam"></iframe>
            <div class="webcam-overlay" onclick="this.style.pointerEvents='none'"></div>
            <div class="webcam-annotation">Rigi: 1659m</div>
        </div>
        <div class="webcam-wrapper">
            <iframe src="https://titlis.roundshot.com/alpstubli-truebsee/" allowfullscreen
                title="Titlis Webcam"></iframe>
            <div class="webcam-overlay" onclick="this.style.pointerEvents='none'"></div>
            <div class="webcam-annotation">Titlis: 1764m</div>
        </div>
        <div class="webcam-wrapper">
            <iframe src="https://andermatt-sedrun-disentis.roundshot.com/gemsstock/" allowfullscreen
                title="Gemsstock Webcam"></iframe>
            <div class="webcam-overlay" onclick="this.style.pointerEvents='none'"></div>
            <div class="webcam-annotation">Gemsstock: 2961m</div>
        </div>
        <div class="webcam-wrapper">
            <iframe src="https://sanbernardino.roundshot.com/pan-de-zucher/#/" allowfullscreen
                title="San Bernardino Webcam"></iframe>
            <div class="webcam-overlay" onclick="this.style.pointerEvents='none'"></div>
            <div class="webcam-annotation">San Bernardino: 2322m</div>
        </div>
        <div class="webcam-wrapper">
            <iframe src="https://lenzerheide.roundshot.com/urdenfuerggli" allowfullscreen
                title="Lenzerheide Webcam"></iframe>
            <div class="webcam-overlay" onclick="this.style.pointerEvents='none'"></div>
            <div class="webcam-annotation">Lenzerheide: 2543m</div>
        </div>
    </div>

    <a href="index.html" class="nav-link">&larr; Back to Directory</a>

    <!-- Load Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="gpx-plotter.js"></script>
</body>

</html>
